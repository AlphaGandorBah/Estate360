services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: estate360
      POSTGRES_USER: estate360
      POSTGRES_PASSWORD: estate360
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:3310:3310"
    volumes:
      - clamavdata:/var/lib/clamav

  web:
    build: .
    restart: unless-stopped
    command: python -m daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
      - mediafiles:/app/media
    env_file:
      - .env
    environment:
      # COMPOSE_DATABASE_URL lets this gateway use an existing host database;
      # fresh installations keep the self-contained Compose database.
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgres://estate360:estate360@db:5432/estate360}
      REDIS_URL: redis://redis:6379
      # Always include the selected gateway host, including when the setup
      # script overrides HTTPS_HOST for a changed LAN address.
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1},${HTTPS_HOST:-localhost}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173},http://${HTTPS_HOST:-localhost}:5173,https://${HTTPS_HOST:-localhost}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173},http://${HTTPS_HOST:-localhost}:5173,https://${HTTPS_HOST:-localhost}"
      TRUST_PROXY_HEADERS: "True"
      JWT_REFRESH_COOKIE_SECURE: "True"
      MEDIA_S3_ENDPOINT: http://minio:9000
      # Presigned browser URLs must point at Caddy's HTTPS media gateway,
      # while uploads continue to use MinIO's private Compose address above.
      MEDIA_HOST: https://${HTTPS_HOST:-localhost}:9443
      # `.env` uses localhost for running Django directly on the host. Inside
      # Docker, ClamAV is reached by its Compose service name instead.
      CLAMAV_HOST: clamav
      EMAIL_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
      - minio
      - clamav

  worker:
    build: .
    restart: unless-stopped
    command: celery -A config.celery worker -Q images,email,default -l info --concurrency=2
    volumes:
      - .:/app
      - mediafiles:/app/media
    env_file:
      - .env
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgres://estate360:estate360@db:5432/estate360}
      REDIS_URL: redis://redis:6379
      MEDIA_S3_ENDPOINT: http://minio:9000
      MEDIA_HOST: https://${HTTPS_HOST:-localhost}:9443
      CLAMAV_HOST: clamav
      EMAIL_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis
      - minio
      - clamav

  beat:
    build: .
    restart: unless-stopped
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgres://estate360:estate360@db:5432/estate360}
      REDIS_URL: redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db
      - redis

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    environment:
      # Set HTTPS_HOST in .env to the LAN hostname or IP used by browsers.
      # The fallback keeps localhost-only development usable.
      HTTPS_HOST: ${HTTPS_HOST:-estate360.local}
    ports:
      - "80:80"
      - "443:443"
      - "9443:9443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - minio

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
  mediafiles:
  caddy_data:
  caddy_config:
