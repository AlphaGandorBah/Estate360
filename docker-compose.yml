version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: estate360
      POSTGRES_USER: estate360
      POSTGRES_PASSWORD: estate360
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"
    volumes:
      - clamavdata:/var/lib/clamav

  web:
    build: .
    command: python -m daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
      - mediafiles:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio

  worker:
    build: .
    command: celery -A config.celery worker -Q images,email,default -l info --concurrency=2
    volumes:
      - .:/app
      - mediafiles:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis

  beat:
    build: .
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  redisdata:
  miniodata:
  clamavdata:
  mediafiles:
