name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: estate360_test
          POSTGRES_USER: estate360
          POSTGRES_PASSWORD: estate360
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgres://estate360:estate360@localhost:5432/estate360_test
      SECRET_KEY: ci-test-secret-key
      JWT_SIGNING_KEY: ci-test-jwt-key
      REDIS_URL: redis://localhost:6379
      MEDIA_S3_ENDPOINT: http://localhost:9000
      MEDIA_S3_ACCESS_KEY: minioadmin
      MEDIA_S3_SECRET_KEY: minioadmin
      MEDIA_S3_BUCKET: estate360-test
      MEDIA_S3_REGION: us-east-1
      MEDIA_HOST: http://localhost:9000
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      CLAMAV_HOST: ""
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check apps/ config/

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: pytest --tb=short --cov=apps --cov-report=term-missing --cov-fail-under=80

      - name: Generate OpenAPI schema
        run: |
          python manage.py spectacular --color --file docs/openapi.yaml
          echo "Schema generated."
