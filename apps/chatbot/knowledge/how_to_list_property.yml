intent: how_to_list_property
examples:
  - "how do I list my property"
  - "how to add a listing"
  - "how do I become a landlord here"
  - "how to post my apartment for rent"
  - "I want to list my house"
  - "how do I create a listing"
  - "how to add photos to my listing"
  - "how do I add a 360 tour"
  - "how to upload a panorama"
  - "why can't I submit my listing"
  - "my listing won't submit"
  - "how do I publish my listing"
  - "how do I become a landlord on estate360"
  - "how do I list a property as an agent"
  - "how can an agent find tenants"
  - "I manage properties for landlords"
  - "what do I need to post a property"
responses:
  - "Landlords and agents can click '+ Add Listing' from their dashboard, create a draft, fill in the details, and add at least one 360° photo (capture with your camera or upload an existing equirectangular photo). You must be identity-verified before submitting it for admin approval — the Submit button explains what's missing if it is disabled."
followups:
  - "How does verification work?"
  - "How do I add a 360 photo?"
